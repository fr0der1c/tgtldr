services:
  app:
    build:
      context: .
      dockerfile: deploy/docker/app.Dockerfile
    image: tgtldr-app:dev
    ports:
      - "${TGTLDR_HOST_BIND:-127.0.0.1}:${TGTLDR_HOST_APP_PORT:-8080}:8080"

  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    image: tgtldr-web:dev
